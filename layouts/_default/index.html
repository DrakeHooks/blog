{{ define "main" }}
  <section class="postlist">
    {{ range where site.RegularPages "Section" "posts" }}
      <article class="card">
        <a class="card__link" href="{{ .RelPermalink }}">
          <h2 class="card__title">
            <span class="card__title-text">{{ .Title }}</span>
          </h2>

          <div class="meta">
            {{ .Date.Format "2006-01-02" }}
          </div>

          {{ with .Params.tags }}
            <div class="tags">
              {{ range . }}
                <span class="tag">{{ . }}</span>
              {{ end }}
            </div>
          {{ end }}
        </a>
      </article>
    {{ end }}
  </section>
{{ end }}
